<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全屏展示控制台</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 锁定目标网页的框架 -->
    <iframe id="displayFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <script>
        // =================================================================
        // 📥 【核心配置区域】
        // =================================================================
        const CONFIG = {
            // 1. 目标网址
            targetUrl: "https://ai.hatiaoli.wiki", 

            // 2. 🔑 整个网页唯一的空位：请把“1ienf4c53o...”那一长串值填到下面
            cookies: [
                { name: "share-session", value: "1ienf4c53o4ce0djqldn5k6qlicm0gmq" }
            ],

            // 3. ✅ 已根据你的截图全部自动填好，你不用动它了！
            localStorage: [
                { key: "__user_token__", value: "token" }, // 居然真的就是字面量 "token"
                { key: "crtUse", value: "hwc588xs" },
                { key: "colorMode", value: "dark" },
                { key: "systemNoticeLastShown", value: "Sun Jul 05 2026" }
            ]
        };
        // =================================================================


        // 🚀 自动化注入与全屏加载逻辑
        window.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('displayFrame');
            iframe.src = CONFIG.targetUrl;

            try {
                // 1. 执行 Cookie 注入
                CONFIG.cookies.forEach(c => {
                    if(c.value && c.value !== "1ienf4c53o4ce0djqldn5k6qlicm0gmq") {
                        document.cookie = `${c.name}=${c.value}; path=/; domain=${window.location.hostname}; expires=Tue, 19 Jan 2038 03:14:07 GMT`;
                    }
                });

                // 2. 执行 LocalStorage 注入
                CONFIG.localStorage.forEach(item => {
                    window.localStorage.setItem(item.key, item.value);
                });
                
                console.log("数据注入完毕，正在全屏展现...");
            } catch (e) {
                console.error("本地注入遭遇跨域限制", e);
            }
        });
    </script>
</body>
</html>
