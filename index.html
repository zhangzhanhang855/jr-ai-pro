<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Web Proxy Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result-container {
            margin-top: 20px;
            border: 1px solid #ccc;
            min-height: 500px;
            padding: 10px;
            background: #f9f9f9;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>JR Web Proxy Access</h2>
    <p>Enter a URL and let Render server fetch it for you:</p>
    
    <div>
        <input type="text" id="targetUrl" placeholder="https://example.com" value="https://example.com">
        <button onclick="fetchPage()">Fetch Page</button>
    </div>

    <div id="result-container">
        <p style="color: #666;">Fetched page will appear below...</p>
    </div>
</div>

<script>
    // 替换成你在 Render 部署成功后的实际后端 URL
    const BACKEND_URL = 'https://jrai-v64g.onrender.com/api/proxy'; 

    async function fetchPage() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        const container = document.getElementById('result-container');
        
        if (!urlInput) {
            alert('Please enter a valid URL');
            return;
        }

        container.innerHTML = '<p>Loading from server...</p>';

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ url: urlInput })
            });

            if (!response.ok) {
                throw new Error(`Server returned status: ${response.status}`);
            }

            // 拿到后端传回的网页 HTML 文本
            const htmlContent = await response.text();

            // 使用 iframe 来安全、隔离地渲染返回的 HTML 页面
            const iframe = document.createElement('iframe');
            container.innerHTML = ''; // 清空提示
            container.appendChild(iframe);
            
            // 将 HTML 写入 iframe
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();

        } catch (error) {
            console.error('Fetch error:', error);
            container.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        }
    }
</script>

</body>
</html>
