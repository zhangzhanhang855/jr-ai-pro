<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JR Cloud Browser</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #1e1e1e;
            -webkit-tap-highlight-color: transparent; /* 消除手机端点击高亮蓝框 */
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* 1. 顶部标签切换栏 (手机端支持全自动手指横滑) */
        .tabs-bar {
            height: 44px;
            background-color: #181818;
            display: flex;
            align-items: flex-end;
            padding: 0 8px;
            overflow-x: auto;
            overflow-y: hidden;
            border-bottom: 1px solid #282828;
            -webkit-overflow-scrolling: touch; /* 顺滑的手机滚动体验 */
            flex-shrink: 0;
        }
        /* 隐藏滚动条增强美观 */
        .tabs-bar::-webkit-scrollbar { height: 0px; display: none; }

        .tab {
            height: 34px;
            background-color: #2c2c2c;
            color: #aaa;
            padding: 0 12px;
            border-radius: 6px 6px 0 0;
            margin-right: 4px;
            display: flex;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            max-width: 120px;
            min-width: 75px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .tab.active {
            background-color: #333;
            color: #fff;
            font-weight: bold;
        }
        .tab .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 6px;
        }
        .tab .close-tab {
            font-size: 14px;
            color: #888;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab .close-tab:hover { background: #555; color: #fff; }
        
        .add-tab-btn {
            height: 28px;
            width: 28px;
            background: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 4px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 2. 主控制中心导航栏 (大屏并排，小屏自动换行) */
        .nav-bar {
            min-height: 50px;
            background-color: #333;
            display: flex;
            flex-wrap: wrap; /* 关键：允许空间不够时自动折行 */
            align-items: center;
            padding: 6px 12px;
            border-bottom: 1px solid #222;
            gap: 8px;
            flex-shrink: 0;
        }

        /* 线路切换面板 */
        .route-selector-group {
            display: flex;
            align-items: center;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 6px 10px;
            gap: 6px;
            height: 34px;
            box-sizing: border-box;
        }
        
        .route-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .route-select option { background-color: #222; }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00adb5;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #00adb5;
        }
        .status-dot.loading { background-color: #ffaa00; box-shadow: 0 0 6px #ffaa00; }

        /* 伸缩地址栏外壳 */
        .address-wrapper {
            display: flex;
            position: relative;
            min-width: 150px;
            width: 450px; /* 电脑端默认宽度 */
            max-width: 100%;
        }

        .input-group {
            width: 100%;
            display: flex;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
            height: 34px;
        }
        .input-group:focus-within { border-color: #00adb5; }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 10px;
            font-size: 13px;
            color: #fff;
            outline: none;
            min-width: 50px;
        }

        /* 拉伸边缘热区（支持触屏） */
        .resize-handle {
            position: absolute;
            right: -4px;
            top: 0;
            width: 12px;
            height: 100%;
            cursor: ew-resize;
            z-index: 5;
        }

        .btn-nav {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 0 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .btn-icon {
            background: #444;
            color: #fff;
            border: none;
            height: 34px;
            padding: 0 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* 3. 收藏夹滑条 */
        .bookmark-bar {
            height: 34px;
            background-color: #222;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #111;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .bookmark-bar::-webkit-scrollbar { display: none; }
        
        .bookmark-item {
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            background: #333;
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
            display: inline-block;
            flex-shrink: 0;
        }

        /* 4. 全屏网页展现区 */
        #views-container {
            flex: 1;
            background-color: #ffffff;
            position: relative;
            width: 100%;
        }
        .web-view {
            width: 100%;
            height: 100%;
            border: none;
            display: none; 
        }
        .web-view.active { display: block; }

        /* ================= 📱 手机移动端核心专属响应式样式 ================= */
        @media (max-width: 600px) {
            .nav-bar {
                padding: 8px;
                gap: 6px;
            }
            /* 手机端地址栏和按钮自动吃满横向一整行 */
            .address-wrapper {
                width: 100% !important; /* 强制覆盖拖拽宽度 */
                flex: 1;
            }
            .btn-icon {
                padding: 0 10px;
                font-size: 12px;
            }
            /* 隐藏手机端拉伸边缘，防止误触 */
            .resize-handle {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="browser-container">
    <!-- 1. 标签切换滑条 -->
    <div class="tabs-bar" id="tabsBar">
        <button class="add-tab-btn" onclick="createNewTab()">+</button>
    </div>

    <!-- 2. 响应式控制中枢 -->
    <div class="nav-bar">
        <button class="btn-icon" onclick="toggleBookmark()">⭐ 收藏</button>
        
        <!-- 线路调度 -->
        <div class="route-selector-group">
            <span class="status-dot" id="routeStatusDot"></span>
            <select class="route-select" id="routeSelect" onchange="handleRouteChanges()">
                <option value="route1">⚡ 线路一 (主线)</option>
                <option value="route2">🚀 线路二 (备用)</option>
            </select>
        </div>

        <!-- 触屏自适应地址栏 -->
        <div class="address-wrapper" id="addressWrapper">
            <div class="input-group">
                <input type="text" id="targetUrl" placeholder="输入网址进行跨海全量解析...">
                <button class="btn-nav" onclick="loadCurrentTab()">Go</button>
            </div>
            <div class="resize-handle" id="resizeHandle"></div>
        </div>
    </div>

    <!-- 收藏夹展示 -->
    <div class="bookmark-bar" id="bookmarkBar">
        <span style="color:#666; font-size:12px; flex-shrink:0;">收藏夹:</span>
    </div>

    <!-- 3. 多窗体视窗 -->
    <div id="views-container"></div>
</div>

<script>
    const ROUTES = {
        route1: 'https://jrai-v64g.onrender.com/api/proxy',
        route2: 'https://jr-line2.onrender.com/api/proxy'
    };

    let currentBackendUrl = ROUTES.route1; 
    let tabs = [];
    let activeTabId = null;
    let bookmarks = [];

    // ================= Cookie 工具库 =================
    function setCookie(name, value, days = 30) {
        const d = new Date();
        d.setTime(d.getTime() + (days*24*60*60*1000));
        document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires="+ d.toUTCString() + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0;i < ca.length;i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return JSON.parse(decodeURIComponent(c.substring(nameEQ.length,c.length)));
        }
        return null;
    }

    // 线路自主变换
    function handleRouteChanges() {
        const selectedRoute = document.getElementById('routeSelect').value;
        currentBackendUrl = ROUTES[selectedRoute];
        setCookie('browser_selected_route', selectedRoute);
        if (tabs.find(t => t.id === activeTabId)?.url) {
            loadCurrentTab();
        }
    }

    // ================= 💻电脑端拖拽 ＋ 📱手机端触屏拉伸双路交互 =================
    const wrapper = document.getElementById('addressWrapper');
    const handle = document.getElementById('resizeHandle');
    let isResizing = false;

    const savedWidth = getCookie('browser_address_width');
    if (savedWidth && window.innerWidth > 600) wrapper.style.width = savedWidth + 'px';

    // 1. 电脑端鼠标事件
    handle.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'ew-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing || window.innerWidth <= 600) return;
        let newWidth = e.clientX - wrapper.getBoundingClientRect().left;
        performResize(newWidth);
    });

    // 2. 手机端手指触摸事件
    handle.addEventListener('touchstart', (e) => { isResizing = true; }, {passive: true});
    document.addEventListener('touchmove', (e) => {
        if (!isResizing || window.innerWidth <= 600) return;
        let touchX = e.touches[0].clientX;
        let newWidth = touchX - wrapper.getBoundingClientRect().left;
        performResize(newWidth);
    }, {passive: true});

    document.addEventListener('mouseup', endResize);
    document.addEventListener('touchend', endResize);

    function performResize(width) {
        if (width < 150) width = 150;
        if (width > window.innerWidth * 0.8) width = window.innerWidth * 0.8;
        wrapper.style.width = width + 'px';
    }

    function endResize() {
        if (isResizing) {
            isResizing = false;
            document.body.style.cursor = 'default';
            if(window.innerWidth > 600) {
                setCookie('browser_address_width', parseInt(wrapper.style.width));
            }
        }
    }

    // ================= 浏览器核心控制引擎 =================
    function initBrowser() {
        bookmarks = getCookie('browser_bookmarks') || [];
        renderBookmarks();

        const savedRoute = getCookie('browser_selected_route');
        if (savedRoute && ROUTES[savedRoute]) {
            document.getElementById('routeSelect').value = savedRoute;
            currentBackendUrl = ROUTES[savedRoute];
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'OPEN_NEW_TAB') {
                createNewTab(event.data.url);
            }
        });

        const savedTabs = getCookie('browser_tabs');
        if (savedTabs && savedTabs.length > 0) {
            tabs = savedTabs;
            activeTabId = getCookie('browser_active_tab') || tabs[0].id;
            tabs.forEach(t => createTabElements(t));
            switchTab(activeTabId);
        } else {
            createNewTab();
        }

        // 兼容手机端点击屏幕任意位置瞬间激活多沙箱音频
        const activeAudioEvent = window.innerWidth <= 600 ? 'touchstart' : 'click';
        window.addEventListener(activeAudioEvent, () => {
            tabs.forEach(t => {
                const view = document.getElementById('view_' + t.id);
                if (view && view.tagName === 'IFRAME') {
                    try {
                        const doc = view.contentDocument || view.contentWindow.document;
                        doc.querySelectorAll('audio, video').forEach(a => a.muted = false);
                    } catch(e){}
                }
            });
        }, { once: true });
    }

    function createNewTab(url = '') {
        const id = 'tab_' + Date.now() + Math.floor(Math.random()*100);
        const newTab = { id, url, title: url ? url.replace('https://','').replace('http://','').substring(0,10) : '新标签页' };
        tabs.push(newTab);
        createTabElements(newTab);
        switchTab(id);
        saveTabsState();
    }

    function createTabElements(tab) {
        const tabsBar = document.getElementById('tabsBar');
        const addBtn = tabsBar.querySelector('.add-tab-btn');

        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = 'btn_' + tab.id;
        tabEl.onclick = () => switchTab(tab.id);
        tabEl.innerHTML = `
            <span class="tab-title" id="title_${tab.id}">${tab.title}</span>
            <span class="close-tab" onclick="closeTab(event, '${tab.id}')">×</span>
        `;
        tabsBar.insertBefore(tabEl, addBtn);

        const container = document.getElementById('views-container');
        
        const iframe = document.createElement('iframe');
        iframe.className = 'web-view';
        iframe.id = 'view_' + tab.id;
        iframe.setAttribute('allow', 'autoplay; encrypted-media; clipboard-write; microphone; camera'); 
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups allow-modals');
        container.appendChild(iframe);

        if(tab.url) {
            triggerProxyLoad(tab.id, tab.url);
        } else {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:150px; text-align:center; color:#666; font-size:14px; font-family:sans-serif;">请输入网址并点击 Go</div>`);
            doc.close();
        }
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('btn_' + id)?.classList.add('active');

        document.querySelectorAll('.web-view').forEach(el => el.classList.remove('active'));
        document.getElementById('view_' + id)?.classList.add('active');

        const currentTabData = tabs.find(t => t.id === id);
        document.getElementById('targetUrl').value = currentTabData ? currentTabData.url : '';
        setCookie('browser_active_tab', activeTabId);
        
        // 自动将当前选中的 Tab 标签滑动到正中间视窗（方便手机端滚动展示）
        document.getElementById('btn_' + id)?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function closeTab(event, id) {
        event.stopPropagation();
        document.getElementById('btn_' + id)?.remove();
        document.getElementById('view_' + id)?.remove();
        const index = tabs.findIndex(t => t.id === id);
        tabs = tabs.filter(t => t.id !== id);
        if (activeTabId === id && tabs.length > 0) {
            switchTab(tabs[Math.max(0, index - 1)].id);
        } else if(tabs.length === 0) {
            createNewTab();
        }
        saveTabsState();
    }

    function loadCurrentTab() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        if(!urlInput) return;

        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab) return;

        currentTab.url = urlInput;
        currentTab.title = urlInput.replace('https://','').replace('http://','').substring(0,10);
        document.getElementById('title_' + activeTabId).innerText = currentTab.title;

        // 手机端在点击 Go 后自动收起软键盘，提升观感
        document.getElementById('targetUrl').blur();

        triggerProxyLoad(activeTabId, urlInput);
        saveTabsState();
    }

    async function triggerProxyLoad(tabId, url) {
        const view = document.getElementById('view_' + tabId);
        if (!view) return;
        const dot = document.getElementById('routeStatusDot');

        try {
            dot.className = "status-dot loading";

            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:150px; text-align:center; color:#00adb5; font-size:14px; font-family:sans-serif;">正在通过全量透明网关跨海拉取中...</div>`);
            doc.close();

            const response = await fetch(currentBackendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            if (!response.ok) throw new Error(`Status: ${response.status}`);
            const htmlContent = await response.text();

            doc.open();
            doc.write(htmlContent);
            doc.close();

            dot.className = "status-dot";
        } catch (error) {
            console.error('Fetch Error:', error);
            dot.className = "status-dot loading"; 
            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:100px; padding:20px; color:red; text-align:center; font-size:14px; font-family:sans-serif;">加载失败: ${error.message}<br><br><span style="color:#666; font-size:12px;">💡 提示：若长久卡死，可尝试在控制条中切换主备路线重试。</span></div>`);
            doc.close();
        }
    }

    function saveTabsState() {
        const cleanTabs = tabs.map(t => ({ id: t.id, url: t.url, title: t.title }));
        setCookie('browser_tabs', cleanTabs);
    }

    // 收藏夹
    function toggleBookmark() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab || !currentTab.url) return alert('空页面无法收藏');
        if (bookmarks.some(b => b.url === currentTab.url)) {
            bookmarks = bookmarks.filter(b => b.url !== currentTab.url);
        } else {
            bookmarks.push({ title: currentTab.title, url: currentTab.url });
        }
        setCookie('browser_bookmarks', bookmarks);
        renderBookmarks();
    }

    function renderBookmarks() {
        const bar = document.getElementById('bookmarkBar');
        bar.innerHTML = '<span style="color:#666; font-size:12px; flex-shrink:0;">收藏夹:</span>';
        bookmarks.forEach(b => {
            const span = document.createElement('span');
            span.className = 'bookmark-item';
            span.innerText = `🔖 ${b.title}`;
            span.onclick = () => {
                document.getElementById('targetUrl').value = b.url;
                loadCurrentTab();
            };
            bar.appendChild(span);
        });
    }

    window.onload = initBrowser;
</script>
</body>
</html>
