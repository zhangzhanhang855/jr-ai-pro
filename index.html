<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Cloud Browser</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #1e1e1e;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* 顶部标签栏 */
        .tabs-bar {
            height: 40px;
            background-color: #181818;
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            overflow-x: auto;
            border-bottom: 1px solid #282828;
        }
        .tabs-bar::-webkit-scrollbar { height: 4px; }
        .tabs-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .tab {
            height: 32px;
            background-color: #2c2c2c;
            color: #aaa;
            padding: 0 15px;
            border-radius: 6px 6px 0 0;
            margin-right: 4px;
            display: flex;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            max-width: 150px;
            min-width: 80px;
            transition: all 0.2s;
            position: relative;
        }
        .tab.active {
            background-color: #333;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
        }
        .tab .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }
        .tab .close-tab {
            font-size: 14px;
            color: #888;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab .close-tab:hover { background: #555; color: #fff; }
        
        .add-tab-btn {
            height: 28px;
            width: 28px;
            background: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-tab-btn:hover { background: #444; }

        /* 导航与可伸缩地址栏 */
        .nav-bar {
            height: 50px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #222;
            gap: 10px;
        }

        .address-wrapper {
            display: flex;
            position: relative;
            min-width: 200px;
            max-width: 85%;
            width: 500px; 
        }

        .input-group {
            width: 100%;
            display: flex;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
        }
        .input-group:focus-within { border-color: #00adb5; }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            color: #fff;
            outline: none;
        }

        .resize-handle {
            position: absolute;
            right: -5px;
            top: 0;
            width: 10px;
            height: 100%;
            cursor: ew-resize;
            z-index: 5;
        }

        .btn-nav {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 0 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-nav:hover { background-color: #007a80; }
        
        .btn-icon {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-icon:hover { background: #555; }

        /* 收藏夹展示栏 */
        .bookmark-bar {
            height: 30px;
            background-color: #222;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #111;
        }
        .bookmark-item {
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            background: #333;
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bookmark-item:hover { background: #444; color: #fff; }

        /* 网页展示区 */
        #views-container {
            flex: 1;
            background-color: #ffffff;
            position: relative;
        }
        .web-view {
            width: 100%;
            height: 100%;
            border: none;
            display: none; 
        }
        .web-view.active { display: block; }

        .status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15px;
            color: #666;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="browser-container">
    <div class="tabs-bar" id="tabsBar">
        <button class="add-tab-btn" onclick="createNewTab()">+</button>
    </div>

    <div class="nav-bar">
        <button class="btn-icon" onclick="toggleBookmark()">⭐ 收藏</button>
        <div class="address-wrapper" id="addressWrapper">
            <div class="input-group">
                <input type="text" id="targetUrl" placeholder="输入网址，后端自动补齐协议头">
                <button class="btn-nav" onclick="loadCurrentTab()">Go</button>
            </div>
            <div class="resize-handle" id="resizeHandle"></div>
        </div>
    </div>

    <div class="bookmark-bar" id="bookmarkBar">
        <span style="color:#666; font-size:12px;">收藏夹:</span>
    </div>

    <div id="views-container"></div>
</div>

<script>
    // 💡 已经配置好你的 Render 真实后端地址！
    const BACKEND_URL = 'https://jrai-v64g.onrender.com/api/proxy'; 

    let tabs = [];
    let activeTabId = null;
    let bookmarks = [];

    // Cookie 持久化工具
    function setCookie(name, value, days = 30) {
        const d = new Date();
        d.setTime(d.getTime() + (days*24*60*60*1000));
        document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires="+ d.toUTCString() + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0;i < ca.length;i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return JSON.parse(decodeURIComponent(c.substring(nameEQ.length,c.length)));
        }
        return null;
    }

    // 可拉伸地址栏
    const wrapper = document.getElementById('addressWrapper');
    const handle = document.getElementById('resizeHandle');
    let isResizing = false;

    const savedWidth = getCookie('browser_address_width');
    if (savedWidth) wrapper.style.width = savedWidth + 'px';

    handle.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'ew-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let newWidth = e.clientX - wrapper.getBoundingClientRect().left;
        if (newWidth < 200) newWidth = 200;
        if (newWidth > window.innerWidth * 0.85) newWidth = window.innerWidth * 0.85;
        wrapper.style.width = newWidth + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (isResizing) {
            isResizing = false;
            document.body.style.cursor = 'default';
            setCookie('browser_address_width', parseInt(wrapper.style.width));
        }
    });

    // 核心业务：标签页管理
    function initBrowser() {
        bookmarks = getCookie('browser_bookmarks') || [];
        renderBookmarks();

        const savedTabs = getCookie('browser_tabs');
        if (savedTabs && savedTabs.length > 0) {
            tabs = savedTabs;
            activeTabId = getCookie('browser_active_tab') || tabs[0].id;
            tabs.forEach(t => createTabElements(t));
            switchTab(activeTabId);
        } else {
            createNewTab();
        }
    }

    function createNewTab(url = '') {
        const id = 'tab_' + Date.now() + Math.floor(Math.random()*100);
        const newTab = { id, url, title: url ? url.replace('https://','') : '新标签页' };
        tabs.push(newTab);
        createTabElements(newTab);
        switchTab(id);
        saveTabsState();
    }

    function createTabElements(tab) {
        const tabsBar = document.getElementById('tabsBar');
        const addBtn = tabsBar.querySelector('.add-tab-btn');

        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = 'btn_' + tab.id;
        tabEl.onclick = () => switchTab(tab.id);
        tabEl.innerHTML = `
            <span class="tab-title" id="title_${tab.id}">${tab.title}</span>
            <span class="close-tab" onclick="closeTab(event, '${tab.id}')">×</span>
        `;
        tabsBar.insertBefore(tabEl, addBtn);

        const container = document.getElementById('views-container');
        
        // 👉 核心修复：创建最高媒体权限的 iframe 沙箱壳
        const iframe = document.createElement('iframe');
        iframe.className = 'web-view';
        iframe.id = 'view_' + tab.id;
        
        // 允许自动播放、允许解密媒体流
        iframe.setAttribute('allow', 'autoplay; encrypted-media; clipboard-write'); 
        // 赋予执行脚本与同源访问能力，激活原网页音乐播放器的JS
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups');
        
        container.appendChild(iframe);

        if(tab.url) {
            triggerProxyLoad(tab.id, tab.url);
        } else {
            // 空页面提示
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; text-align:center; color:#666; font-family:sans-serif;">输入网址并点击 Go 开始越洋冲浪</div>`);
            doc.close();
        }
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('btn_' + id)?.classList.add('active');

        document.querySelectorAll('.web-view').forEach(el => el.classList.remove('active'));
        document.getElementById('view_' + id)?.classList.add('active');

        const currentTabData = tabs.find(t => t.id === id);
        document.getElementById('targetUrl').value = currentTabData ? currentTabData.url : '';
        setCookie('browser_active_tab', activeTabId);
    }

    function closeTab(event, id) {
        event.stopPropagation();
        document.getElementById('btn_' + id)?.remove();
        document.getElementById('view_' + id)?.remove();

        const index = tabs.findIndex(t => t.id === id);
        tabs = tabs.filter(t => t.id !== id);

        if (activeTabId === id && tabs.length > 0) {
            switchTab(tabs[Math.max(0, index - 1)].id);
        } else if(tabs.length === 0) {
            createNewTab();
        }
        saveTabsState();
    }

    function loadCurrentTab() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        if(!urlInput) return;

        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab) return;

        currentTab.url = urlInput;
        currentTab.title = urlInput.replace('https://','').replace('http://','');
        document.getElementById('title_' + activeTabId).innerText = currentTab.title;

        triggerProxyLoad(activeTabId, urlInput);
        saveTabsState();
    }

    async function triggerProxyLoad(tabId, url) {
        const view = document.getElementById('view_' + tabId);
        if (!view) return;

        try {
            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; text-align:center; color:#00adb5; font-family:sans-serif;">正在通过海外服务器跨海加载中...</div>`);
            doc.close();

            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            if (!response.ok) throw new Error(`Status: ${response.status}`);
            const htmlContent = await response.text();

            // 重新将注入了 <base> 标签的 HTML 写入强授权的 iframe 中
            doc.open();
            doc.write(htmlContent);
            doc.close();
        } catch (error) {
            console.error('Fetch Error:', error);
            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; color:red; text-align:center; font-family:sans-serif;">加载失败: ${error.message}</div>`);
            doc.close();
        }
    }

    function saveTabsState() {
        const cleanTabs = tabs.map(t => ({ id: t.id, url: t.url, title: t.title }));
        setCookie('browser_tabs', cleanTabs);
    }

    // 收藏夹业务
    function toggleBookmark() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab || !currentTab.url) return alert('空页面无法收藏');

        if (bookmarks.some(b => b.url === currentTab.url)) {
            bookmarks = bookmarks.filter(b => b.url !== currentTab.url);
        } else {
            bookmarks.push({ title: currentTab.title, url: currentTab.url });
        }
        setCookie('browser_bookmarks', bookmarks);
        renderBookmarks();
    }

    function renderBookmarks() {
        const bar = document.getElementById('bookmarkBar');
        bar.innerHTML = '<span style="color:#666; font-size:12px;">收藏夹:</span>';
        bookmarks.forEach(b => {
            const span = document.createElement('span');
            span.className = 'bookmark-item';
            span.innerText = `🔖 ${b.title}`;
            span.onclick = () => {
                document.getElementById('targetUrl').value = b.url;
                loadCurrentTab();
            };
            bar.appendChild(span);
        });
    }

    window.onload = initBrowser;
</script>
</body>
</html>
