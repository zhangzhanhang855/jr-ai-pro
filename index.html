<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Cloud Browser (Multi-Route)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #1e1e1e;
        }

        .browser-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* 标签栏 */
        .tabs-bar {
            height: 40px;
            background-color: #181818;
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            overflow-x: auto;
            border-bottom: 1px solid #282828;
        }
        .tabs-bar::-webkit-scrollbar { height: 4px; }
        .tabs-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .tab {
            height: 32px;
            background-color: #2c2c2c;
            color: #aaa;
            padding: 0 15px;
            border-radius: 6px 6px 0 0;
            margin-right: 4px;
            display: flex;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            max-width: 150px;
            min-width: 80px;
            transition: all 0.2s;
            position: relative;
        }
        .tab.active {
            background-color: #333;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
        }
        .tab .tab-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }
        .tab .close-tab {
            font-size: 14px;
            color: #888;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab .close-tab:hover { background: #555; color: #fff; }
        
        .add-tab-btn {
            height: 28px;
            width: 28px;
            background: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 4px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-tab-btn:hover { background: #444; }

        /* 伸缩地址栏与线路控制条 */
        .nav-bar {
            height: 50px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #222;
            gap: 10px;
        }

        /* 🌟 新增：线路选择组合框 */
        .route-selector-group {
            display: flex;
            align-items: center;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 4px 8px;
            gap: 6px;
        }
        
        .route-select {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            padding-right: 5px;
        }
        .route-select option {
            background-color: #222;
            color: #fff;
        }

        /* 状态指示灯 */
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00adb5;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #00adb5;
            transition: all 0.3s;
        }
        .status-dot.loading { background-color: #ffaa00; box-shadow: 0 0 6px #ffaa00; }

        .address-wrapper {
            display: flex;
            position: relative;
            min-width: 200px;
            max-width: 85%;
            width: 500px; 
        }

        .input-group {
            width: 100%;
            display: flex;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
        }
        .input-group:focus-within { border-color: #00adb5; }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            color: #fff;
            outline: none;
        }

        .resize-handle {
            position: absolute;
            right: -5px;
            top: 0;
            width: 10px;
            height: 100%;
            cursor: ew-resize;
            z-index: 5;
        }

        .btn-nav {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 0 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-nav:hover { background-color: #007a80; }
        
        .btn-icon {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-icon:hover { background: #555; }

        .bookmark-bar {
            height: 30px;
            background-color: #222;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #111;
        }
        .bookmark-item {
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            background: #333;
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bookmark-item:hover { background: #444; color: #fff; }

        #views-container {
            flex: 1;
            background-color: #ffffff;
            position: relative;
        }
        .web-view {
            width: 100%;
            height: 100%;
            border: none;
            display: none; 
        }
        .web-view.active { display: block; }
    </style>
</head>
<body>

<div class="browser-container">
    <div class="tabs-bar" id="tabsBar">
        <button class="add-tab-btn" onclick="createNewTab()">+</button>
    </div>

    <div class="nav-bar">
        <button class="btn-icon" onclick="toggleBookmark()">⭐ 收藏</button>
        
        <div class="route-selector-group">
            <span class="status-dot" id="routeStatusDot" title="线路正常"></span>
            <select class="route-select" id="routeSelect" onchange="handleRouteChanges()">
                <option value="route1">⚡ 线路一 (默认)</option>
                <option value="route2">🚀 线路二 (备用)</option>
            </select>
        </div>

        <div class="address-wrapper" id="addressWrapper">
            <div class="input-group">
                <input type="text" id="targetUrl" placeholder="请输入你想访问的海外大厂网址...">
                <button class="btn-nav" onclick="loadCurrentTab()">Go</button>
            </div>
            <div class="resize-handle" id="resizeHandle"></div>
        </div>
    </div>

    <div class="bookmark-bar" id="bookmarkBar">
        <span style="color:#666; font-size:12px;">收藏夹:</span>
    </div>

    <div id="views-container"></div>
</div>

<script>
    // 🌟 核心配置：请在这里填写你的两个不同的 Render 后端项目地址
    const ROUTES = {
        route1: 'https://jrai-v64g.onrender.com/api/proxy',
        route2: 'https://jr-line2.onrender.com/api/proxy' // 💡 改为你的第二个备用后端地址
    };

    // 当前激活的线路请求前缀，默认使用线路一
    let currentBackendUrl = ROUTES.route1; 

    let tabs = [];
    let activeTabId = null;
    let bookmarks = [];

    // ================= Cookie 工具库 =================
    function setCookie(name, value, days = 30) {
        const d = new Date();
        d.setTime(d.getTime() + (days*24*60*60*1000));
        document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires="+ d.toUTCString() + ";path=/";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0;i < ca.length;i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return JSON.parse(decodeURIComponent(c.substring(nameEQ.length,c.length)));
        }
        return null;
    }

    // ================= 线路自主切换调度中枢 =================
    function handleRouteChanges() {
        const selectedRoute = document.getElementById('routeSelect').value;
        currentBackendUrl = ROUTES[selectedRoute];
        
        // 存入 Cookie 持久化，下次打开不用手动重选
        setCookie('browser_selected_route', selectedRoute);
        
        console.log(`[Route Switcher] Dynamically swapped to: ${selectedRoute} -> ${currentBackendUrl}`);
        
        // 智能小提示：如果当前有打开的页面，切换线路后自动刷新当前页以适配新网关
        const currentTab = tabs.find(t => t.id === activeTabId);
        if (currentTab && currentTab.url) {
            loadCurrentTab();
        }
    }

    // ================= 地址栏伸缩交互 =================
    const wrapper = document.getElementById('addressWrapper');
    const handle = document.getElementById('resizeHandle');
    let isResizing = false;

    const savedWidth = getCookie('browser_address_width');
    if (savedWidth) wrapper.style.width = savedWidth + 'px';

    handle.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'ew-resize'; });
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        let newWidth = e.clientX - wrapper.getBoundingClientRect().left;
        if (newWidth < 200) newWidth = 200;
        if (newWidth > window.innerWidth * 0.85) newWidth = window.innerWidth * 0.85;
        wrapper.style.width = newWidth + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (isResizing) {
            isResizing = false;
            document.body.style.cursor = 'default';
            setCookie('browser_address_width', parseInt(wrapper.style.width));
        }
    });

    // ================= 核心多标签引擎 =================
    function initBrowser() {
        bookmarks = getCookie('browser_bookmarks') || [];
        renderBookmarks();

        // 恢复用户上次选好的线路
        const savedRoute = getCookie('browser_selected_route');
        if (savedRoute && ROUTES[savedRoute]) {
            document.getElementById('routeSelect').value = savedRoute;
            currentBackendUrl = ROUTES[savedRoute];
        }

        // 跨域拦截雷达
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'OPEN_NEW_TAB') {
                createNewTab(event.data.url);
            }
        });

        const savedTabs = getCookie('browser_tabs');
        if (savedTabs && savedTabs.length > 0) {
            tabs = savedTabs;
            activeTabId = getCookie('browser_active_tab') || tabs[0].id;
            tabs.forEach(t => createTabElements(t));
            switchTab(activeTabId);
        } else {
            createNewTab();
        }

        window.addEventListener('click', () => {
            tabs.forEach(t => {
                const view = document.getElementById('view_' + t.id);
                if (view && view.tagName === 'IFRAME') {
                    try {
                        const doc = view.contentDocument || view.contentWindow.document;
                        doc.querySelectorAll('audio, video').forEach(a => a.muted = false);
                    } catch(e){}
                }
            });
        }, { once: true });
    }

    function createNewTab(url = '') {
        const id = 'tab_' + Date.now() + Math.floor(Math.random()*100);
        const newTab = { id, url, title: url ? url.replace('https://','').replace('http://','').substring(0,12) : '新标签页' };
        tabs.push(newTab);
        createTabElements(newTab);
        switchTab(id);
        saveTabsState();
    }

    function createTabElements(tab) {
        const tabsBar = document.getElementById('tabsBar');
        const addBtn = tabsBar.querySelector('.add-tab-btn');

        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = 'btn_' + tab.id;
        tabEl.onclick = () => switchTab(tab.id);
        tabEl.innerHTML = `
            <span class="tab-title" id="title_${tab.id}">${tab.title}</span>
            <span class="close-tab" onclick="closeTab(event, '${tab.id}')">×</span>
        `;
        tabsBar.insertBefore(tabEl, addBtn);

        const container = document.getElementById('views-container');
        
        const iframe = document.createElement('iframe');
        iframe.className = 'web-view';
        iframe.id = 'view_' + tab.id;
        
        iframe.setAttribute('allow', 'autoplay; encrypted-media; clipboard-write; microphone; camera'); 
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups allow-modals');
        container.appendChild(iframe);

        if(tab.url) {
            triggerProxyLoad(tab.id, tab.url);
        } else {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; text-align:center; color:#666; font-family:sans-serif;">请输入网址并点击 Go</div>`);
            doc.close();
        }
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('btn_' + id)?.classList.add('active');

        document.querySelectorAll('.web-view').forEach(el => el.classList.remove('active'));
        document.getElementById('view_' + id)?.classList.add('active');

        const currentTabData = tabs.find(t => t.id === id);
        document.getElementById('targetUrl').value = currentTabData ? currentTabData.url : '';
        setCookie('browser_active_tab', activeTabId);
    }

    function closeTab(event, id) {
        event.stopPropagation();
        document.getElementById('btn_' + id)?.remove();
        document.getElementById('view_' + id)?.remove();
        const index = tabs.findIndex(t => t.id === id);
        tabs = tabs.filter(t => t.id !== id);
        if (activeTabId === id && tabs.length > 0) {
            switchTab(tabs[Math.max(0, index - 1)].id);
        } else if(tabs.length === 0) {
            createNewTab();
        }
        saveTabsState();
    }

    function loadCurrentTab() {
        const urlInput = document.getElementById('targetUrl').value.trim();
        if(!urlInput) return;

        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab) return;

        currentTab.url = urlInput;
        currentTab.title = urlInput.replace('https://','').replace('http://','').substring(0,12);
        document.getElementById('title_' + activeTabId).innerText = currentTab.title;

        triggerProxyLoad(activeTabId, urlInput);
        saveTabsState();
    }

    async function triggerProxyLoad(tabId, url) {
        const view = document.getElementById('view_' + tabId);
        if (!view) return;

        const dot = document.getElementById('routeStatusDot');

        try {
            // 指示灯变橙：加载中
            dot.className = "status-dot loading";
            dot.title = "正在通过所选线路跨海加速拉取中...";

            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; text-align:center; color:#00adb5; font-family:sans-serif;">正在调集选定海外节点网关解析加载...</div>`);
            doc.close();

            // 💡 自动根据用户选中的 currentBackendUrl 发起调度
            const response = await fetch(currentBackendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            if (!response.ok) throw new Error(`Status: ${response.status}`);
            const htmlContent = await response.text();

            doc.open();
            doc.write(htmlContent);
            doc.close();

            // 指示灯恢复青绿：成功
            dot.className = "status-dot";
            dot.title = "线路畅通";
        } catch (error) {
            console.error('Fetch Error:', error);
            dot.className = "status-dot loading"; 
            dot.title = "当前线路可能正在休眠或发生错误，请尝试切换线路";
            
            const doc = view.contentDocument || view.contentWindow.document;
            doc.open();
            doc.write(`<div style="margin-top:200px; color:red; text-align:center; font-family:sans-serif;">无法通过当前线路加载该网页: ${error.message}<br><br><span style="color:#666; font-size:13px;">💡 提示：如果长久无响应，可尝试在控制条左侧切换为【线路二】重新访问。</span></div>`);
            doc.close();
        }
    }

    function saveTabsState() {
        const cleanTabs = tabs.map(t => ({ id: t.id, url: t.url, title: t.title }));
        setCookie('browser_tabs', cleanTabs);
    }

    // 收藏夹
    function toggleBookmark() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if(!currentTab || !currentTab.url) return alert('空页面无法收藏');
        if (bookmarks.some(b => b.url === currentTab.url)) {
            bookmarks = bookmarks.filter(b => b.url !== currentTab.url);
        } else {
            bookmarks.push({ title: currentTab.title, url: currentTab.url });
        }
        setCookie('browser_bookmarks', bookmarks);
        renderBookmarks();
    }

    function renderBookmarks() {
        const bar = document.getElementById('bookmarkBar');
        bar.innerHTML = '<span style="color:#666; font-size:12px;">收藏夹:</span>';
        bookmarks.forEach(b => {
            const span = document.createElement('span');
            span.className = 'bookmark-item';
            span.innerText = `🔖 ${b.title}`;
            span.onclick = () => {
                document.getElementById('targetUrl').value = b.url;
                loadCurrentTab();
            };
            bar.appendChild(span);
        });
    }

    window.onload = initBrowser;
</script>
</body>
</html>
